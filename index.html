<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="display">0</div>
      <div class="buttons">
        <div class="controls">
          <button class="btn--ctrl" data-action="all-clear">Clear all</button>
          <button class="btn--ctrl" data-action="remove">Remove</button>
        </div>
        <div class="numbers">
          <button data-input="num" value="0">0</button>
          <button data-input="num" value=".">.</button>
          <button class="btn--operator" data-action="calc">=</button>
          <button data-input="num" value="1">1</button>
          <button data-input="num" value="2">2</button>
          <button data-input="num" value="3">3</button>
          <button data-input="num" value="4">4</button>
          <button data-input="num" value="5">5</button>
          <button data-input="num" value="6">6</button>
          <button data-input="num" value="7">7</button>
          <button data-input="num" value="8">8</button>
          <button data-input="num" value="9">9</button>
        </div>
        <div class="operators">
          <button class="btn--operator" data-input="operator">+</button>
          <button class="btn--operator" data-input="operator">-</button>
          <button class="btn--operator" data-input="operator">*</button>
          <button class="btn--operator" data-input="operator">÷</button>
        </div>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>

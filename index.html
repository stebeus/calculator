<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="display"></div>
      <div class="buttons">
        <div class="controls">
          <button class="controls__btn">Clear all</button>
          <button class="controls__btn">Remove</button>
        </div>
        <div class="numbers"></div>
        <div class="operators">
          <button class="operators__btn">+</button>
          <button class="operators__btn">-</button>
          <button class="operators__btn">*</button>
          <button class="operators__btn">÷</button>
          <button class="operators__btn">^</button>
          <button class="operators__btn">√</button>
          <button class="operators__btn">!</button>
        </div>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="display">0</div>
      <div class="buttons">
        <div class="controls">
          <button class="btn--ctrl">Clear all</button>
          <button class="btn--ctrl">Remove</button>
        </div>
        <div class="numbers">
          <button>0</button>
          <button>.</button>
          <button class="btn--operator">=</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>7</button>
          <button>8</button>
          <button>9</button>
        </div>
        <div class="operators">
          <button class="btn--operator">+</button>
          <button class="btn--operator">-</button>
          <button class="btn--operator">*</button>
          <button class="btn--operator">÷</button>
        </div>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
